<!DOCTYPE html>
<html>
<head>

<title>Used Car Dealership</title>

<link rel="stylesheet" href="style.css">

<script src="data.js"></script>
<script defer src="script.js"></script>
<!-- I don't know why I have to have defer here but I tried to make it work without it and it wouldn't -->

</head>

<body>

<header>
<h1>Used Car Dealership</h1>
</header>

<section class="filters">

<h2>Filter Cars</h2>

<label>Min Year</label>
<input type="number" id="minYear">

<label>Max Year</label>
<input type="number" id="maxYear">

<br><br>

<label>Make</label>
<input type="text" id="make" placeholder="Toyota, Honda etc">

<br><br>

<label>Max Mileage</label>
<input type="number" id="maxMileage">

<br><br>

<label>Min Price</label>
<input type="number" id="minPrice">

<label>Max Price</label>
<input type="number" id="maxPrice">

<br><br>

<label>Color</label>
<input type="text" id="color" placeholder="Black, White etc">

<br><br>

<button id="filterBtn">Apply Filters</button>

</section>

<section id="carContainer" class="carContainer"></section>

<p id="noResults"></p>

</body>
</html>
