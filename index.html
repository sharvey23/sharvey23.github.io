<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Used Car Dealership</title>

<link rel="stylesheet" href="styles.css">

<script src="data.js"></script>
<script defer src="script.js"></script>
</head>

<body>

<header>
<h1>Premium Used Cars</h1>
</header>

<section class="filters">

<h2>Filter Cars</h2>

<div class="filter-group">
<label>Min Year</label>
<input type="number" id="minYear" placeholder="2005">

<label>Max Year</label>
<input type="number" id="maxYear" placeholder="2024">
</div>

<div class="filter-group">
<label>Car Make</label>

<label><input type="checkbox" value="Toyota" class="make"> Toyota</label>
<label><input type="checkbox" value="Ford" class="make"> Ford</label>
<label><input type="checkbox" value="Honda" class="make"> Honda</label>
<label><input type="checkbox" value="Lexus" class="make"> Lexus</label>
<label><input type="checkbox" value="BMW" class="make"> BMW</label>
</div>

<div class="filter-group">
<label>Max Mileage</label>
<select id="maxMileage">
<option value="">Any</option>
<option value="15000">Under 15,000</option>
<option value="30000">Under 30,000</option>
<option value="60000">Under 60,000</option>
<option value="100000">Under 100,000</option>
</select>
</div>

<div class="filter-group">
<label>Min Price</label>
<input type="number" id="minPrice" placeholder="5000">

<label>Max Price</label>
<input type="number" id="maxPrice" placeholder="25000">
</div>

<div class="filter-group">
<label>Color</label>

<label><input type="checkbox" value="Black" class="color"> Black</label>
<label><input type="checkbox" value="White" class="color"> White</label>
<label><input type="checkbox" value="Silver" class="color"> Silver</label>
<label><input type="checkbox" value="Red" class="color"> Red</label>
</div>

<button id="applyFilters">Apply Filters</button>

</section>


<section id="carContainer" class="car-container"></section>

<p id="noResults"></p>

</body>
</html>
