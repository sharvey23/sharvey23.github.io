<!DOCTYPE html>
<html lang="en">
<head>

<title>Used Car Dealership</title>

<link rel="stylesheet" href="style.css">

<script src="data.js"></script>
<script defer src="script.js"></script>
<!-- I don't know why I have to have defer here but I tried to make it work without it and it wouldn't -->

</head>

<body>

<header>
<h1>Used Car Dealership</h1>
</header>

<main>

<section class="filters">
<h2>Filter Cars</h2>

<form id="filterForm">

<fieldset>
<legend>Year</legend>

<label for="minYear">Min Year</label>
<input type="number" id="minYear" name="minYear">

<label for="maxYear">Max Year</label>
<input type="number" id="maxYear" name="maxYear">

</fieldset>

<br>

<fieldset>
<legend>Make</legend>

<label for="make">Make</label>
<input type="text" id="make" name="make" placeholder="Toyota, Honda etc">

</fieldset>

<br>

<fieldset>
<legend>Mileage</legend>

<label for="maxMileage">Max Mileage</label>
<input type="number" id="maxMileage" name="maxMileage">

</fieldset>

<br>

<fieldset>
<legend>Price</legend>

<label for="minPrice">Min Price</label>
<input type="number" id="minPrice" name="minPrice">

<label for="maxPrice">Max Price</label>
<input type="number" id="maxPrice" name="maxPrice">

</fieldset>

<br>

<fieldset>
<legend>Color</legend>

<label for="color">Color</label>
<input type="text" id="color" name="color" placeholder="Black, White etc">

</fieldset>

<br>

<button type="button" id="filterBtn">Apply Filters</button>

</form>

</section>

<section id="carContainer" class="carContainer" aria-live="polite"></section>

<section>
<p id="noResults"></p>
</section>

</main>

<footer></footer>

</body>
</html>
